<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TouchChat Style TTS</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">
    <h1>Phrase Builder</h1>

    <div class="controls">
      <div class="word-grid" id="wordGrid">
        <!-- Buttons inserted by JS -->
      </div>

      <div class="sentence-area">
        <div id="sentence" class="sentence">Click words to build a sentence</div>
        <div class="actions">
          <button id="clearBtn">Clear</button>
          <button id="backspaceBtn">Backspace</button>
        </div>
      </div>

      <div class="voice-area">
        <label>Gender</label>
        <div>
          <label><input type="radio" name="gender" value="female" checked> Female</label>
          <label><input type="radio" name="gender" value="male"> Male</label>
        </div>

        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect"></select>

        <div class="play-actions">
          <button id="playBtn">Play</button>
        </div>

        <div id="status" class="status"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
